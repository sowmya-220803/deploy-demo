<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deployment Demo</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">My Demo</a>
        <button class="btn btn-success" id="alertBtn">Click Me</button>
    </div>
</nav>

<!-- Hero Section -->
<div class="container text-center mt-5">
    <h1 class="display-4">Welcome to My Website</h1>
    <p class="lead">This site is deployed using modern hosting platforms.</p>
    <button class="btn btn-primary" id="changeTextBtn">Change Text</button>
</div>

<!-- Cards Section -->
<div class="container mt-5">
    <div class="row">

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title">GitHub Pages</h5>
                    <p class="card-text">Free hosting for static websites.</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title">Netlify</h5>
                    <p class="card-text">Fast deployment with CI/CD.</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title">Vercel</h5>
                    <p class="card-text">Best for frontend frameworks.</p>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center mt-5 p-3">
    <p id="footerText">© 2026 My Deployment Demo</p>
</footer>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="script.js"></script>

</body>
</html>
